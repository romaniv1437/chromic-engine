name: Build & Release Chromic Engine

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v1.0.55)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  # Ensure a draft release exists so all build jobs upload to the same one
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create or reuse GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # If a release (draft or published) already exists for this tag, skip creation
          if gh release view "${{ env.RELEASE_TAG }}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "✅ Release ${{ env.RELEASE_TAG }} already exists, skipping creation"
          else
            gh release create "${{ env.RELEASE_TAG }}" --repo "${{ github.repository }}" \
              --title "${{ env.RELEASE_TAG }}" --draft --generate-notes
            echo "✅ Created draft release ${{ env.RELEASE_TAG }}"
          fi

  build:
    needs: create-release
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Python needed for node-gyp native module rebuilds
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Linux: install system deps for electron-builder (AppImage, deb)
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg fakeroot rpm

      # macOS: Create self-signed certificate for code signing
      - name: Create self-signed certificate (macOS)
        if: runner.os == 'macOS'
        run: |
          # Create a self-signed certificate for code signing
          # This will show "romaniv1437" as the signer in Finder
          CERT_NAME="romaniv1437"
          KEYCHAIN_NAME="build.keychain"
          KEYCHAIN_PASSWORD="build123"
          
          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN_NAME"
          
          # Add to search list (REQUIRED for codesign to find it)
          security list-keychains -d user -s "$KEYCHAIN_NAME" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          
          # Generate self-signed certificate
          cat > /tmp/cert.conf << EOF
          [req]
          distinguished_name = req_distinguished_name
          x509_extensions = v3_req
          prompt = no
          
          [req_distinguished_name]
          CN = $CERT_NAME
          O = Chromic Engine
          
          [v3_req]
          keyUsage = critical, digitalSignature
          extendedKeyUsage = codeSigning
          basicConstraints = CA:FALSE
          EOF
          
          # Create certificate and key
          openssl req -x509 -newkey rsa:2048 -keyout /tmp/key.pem -out /tmp/cert.pem \
            -days 365 -nodes -config /tmp/cert.conf
          
          # Convert to p12
          openssl pkcs12 -export -out /tmp/cert.p12 -inkey /tmp/key.pem -in /tmp/cert.pem \
            -passout pass:cert123
          
          # Import to keychain with codesign access
          security import /tmp/cert.p12 -k "$KEYCHAIN_NAME" -P "cert123" \
            -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
          
          # Allow codesign to use the certificate without prompting
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          
          # Find and export the certificate SHA-1 hash for codesign
          CERT_SHA1=$(security find-identity -v -p codesigning "$KEYCHAIN_NAME" | grep "$CERT_NAME" | head -1 | awk '{print $2}')
          echo "CODESIGN_IDENTITY=$CERT_SHA1" >> $GITHUB_ENV
          
          echo "✅ Self-signed certificate created: $CERT_NAME"
          echo "📍 Certificate SHA-1: $CERT_SHA1"
          
          # Verify certificate is findable
          security find-identity -v -p codesigning

      # Windows: Create self-signed certificate for code signing
      - name: Create self-signed certificate (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Create a self-signed code signing certificate
          # This will show "romaniv1437 (Chromic Engine)" as the publisher
          $cert = New-SelfSignedCertificate `
            -Type CodeSigningCert `
            -Subject "CN=romaniv1437, O=Chromic Engine" `
            -KeyUsage DigitalSignature `
            -KeyAlgorithm RSA `
            -KeyLength 2048 `
            -CertStoreLocation Cert:\CurrentUser\My `
            -NotAfter (Get-Date).AddYears(1)
          
          # Export to PFX for signtool
          $certPassword = ConvertTo-SecureString -String "cert123" -Force -AsPlainText
          $certPath = "$env:RUNNER_TEMP\codesign.pfx"
          Export-PfxCertificate -Cert $cert -FilePath $certPath -Password $certPassword
          
          # Set environment variable for electron-builder
          echo "WIN_CSC_LINK=$certPath" >> $env:GITHUB_ENV
          echo "WIN_CSC_KEY_PASSWORD=cert123" >> $env:GITHUB_ENV
          
          Write-Host "✅ Self-signed certificate created: romaniv1437"
          Write-Host "Certificate thumbprint: $($cert.Thumbprint)"

      - name: Install dependencies
        run: npm install

      - name: Build & Publish
        run: |
          node -e "const {execSync}=require('child_process'); const tag='${{ env.RELEASE_TAG }}'; const version=tag.replace(/^v/,''); if(!/^\d+\.\d+\.\d+([-.].+)?$/.test(version)){throw new Error('Invalid release tag: '+tag);} console.log('[release] tag='+tag+' version='+version); execSync('npx electron-builder build --publish always --config.extraMetadata.version='+version,{stdio:'inherit'});"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Disable electron-builder auto code signing (we handle it in afterSign hook)
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          # CODESIGN_IDENTITY is set by the certificate creation step (SHA-1 hash on macOS)

  # Publish the draft release after all builds complete
  publish-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: false

