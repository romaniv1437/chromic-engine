<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Audio Visualizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #ui {
      position: fixed; top: 10px; left: 10px; color: #fff; font-family: monospace; font-size: 13px; z-index: 10;
    }
    #ui button { margin: 2px; padding: 4px 8px; cursor: pointer; background: #222; color: #fff; border: 1px solid #555; }
    #ui button.active { background: #06f; }
    #drop-zone {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      color: #fff; font-family: monospace; font-size: 18px; pointer-events: none; opacity: 0.6;
      display: none;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div>Scenes: <button data-scene="0" class="active">Julia</button><button data-scene="1">Lorenz</button><button data-scene="2">Riemann</button><button data-scene="3">Reaction-Diff</button><button data-scene="4">Hyperbolic</button></div>
    <div style="margin-top:5px"><button id="btn-mic">🎤 Mic</button> <span style="opacity:0.5">or drag & drop audio file</span></div>
  </div>
  <div id="drop-zone">Drop audio file here</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
