<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MyMedia - Math Visualizer Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a12; font-family: -apple-system, BlinkMacSystemFont, monospace; }
    #visualizer-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      /* Simulated album art / video background */
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a12 100%);
    }
    #ui {
      position: fixed; top: 10px; left: 10px; color: #fff; font-size: 13px; z-index: 50;
      transition: opacity 0.4s;
    }
    #ui button { margin: 2px; padding: 5px 10px; cursor: pointer; background: #1a1a2e; color: #aaa; border: 1px solid #333; border-radius: 4px; transition: all 0.2s; }
    #ui button:hover { background: #2a2a4e; color: #fff; }
    #ui button.active { background: #4466ff; color: #fff; border-color: #4466ff; }
    #scene-info { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); color: #555; font-size: 11px; z-index: 50; }
  </style>
  <script type="module" crossorigin src="/assets/index-tfUkWbkw.js"></script>
</head>
<body>
  <div id="visualizer-container"></div>
  <div id="ui">
    <div>
      <button data-scene="0" class="active">Julia Set</button>
      <button data-scene="1">Lorenz</button>
      <button data-scene="2">Riemann</button>
      <button data-scene="3">Reaction-Diff</button>
      <button data-scene="4">Hyperbolic</button>
    </div>
    <div style="margin-top:6px; opacity: 0.6; font-size: 11px;">Drop audio file or press 1-5 to switch scenes</div>
  </div>
  <div id="scene-info">Math Overlay • Keys 1-5 • Drag audio to start</div>
</body>
</html>
